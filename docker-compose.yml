services:
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    container_name: cic_information_retriver_base
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: cic_rag_api
    env_file: [.env]
    environment:
      HF_HOME: /cache/hf
      FASTEMBED_CACHE_PATH: /cache/fastembed
    volumes:
      - model_cache:/cache
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    networks: [backend]
  
volumes:
  model_cache:
  qdrant_data:

networks:
  backend:
    driver: bridge
